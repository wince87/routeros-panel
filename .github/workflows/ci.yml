name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm pack --pack-destination /tmp && ls -lh /tmp/mikrotik-panel-*.tgz

  cli-smoke:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Probe CLI
        run: |
          node bin/cli.js --port 3456 &
          PID=$!
          sleep 1
          curl -fsS -o /dev/null http://127.0.0.1:3456/ || (kill $PID; exit 1)
          curl -fsS -o /dev/null http://127.0.0.1:3456/dashboard || (kill $PID; exit 1)
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "X-Router-Target: http://1.1.1.1" http://127.0.0.1:3456/api/system/identity)
          if [ "$code" != "403" ]; then kill $PID; exit 1; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" -H "X-Router-Target: not-a-url" http://127.0.0.1:3456/api/system/identity)
          if [ "$code" != "400" ]; then kill $PID; exit 1; fi
          kill $PID
          echo "CLI smoke OK"
